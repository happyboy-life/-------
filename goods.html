<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>农产品展示与发布平台 - 农产品列表</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            font-size: 14px;
            color: #333;
        }
        /* 通用弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal .content {
            width: 85%;
            background-color: #fff;
            border-radius: 12px;
            padding: 20px;
        }
        .modal .content .title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
        .modal .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .modal .btn-group button {
            width: 48%;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }
        .modal .cancel {
            background-color: #f5f5f5;
            color: #666;
        }
        .modal .confirm {
            background-color: #0088ff;
            color: #fff;
        }
        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 20px;
            background-color: rgba(0,0,0,0.7);
            color: #fff;
            border-radius: 4px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }

        /* ========== 农产品列表页样式 ========== */
        .header {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 99;
            gap: 8px;
        }
        .search-icon-wrap {
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        .search-icon-wrap:hover {
            background-color: #f5f5f5;
        }
        .search-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        .search-input {
            flex: 1;
            height: 36px;
            line-height: 36px;
            padding: 0 12px;
            border: 1px solid #eee;
            border-radius: 18px;
            background-color: #f8f8f8;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: #0088ff;
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(0, 136, 255, 0.1);
        }
        .search-input::placeholder {
            color: #999;
        }
        .city {
            margin-left: 5px;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
            white-space: nowrap;
        }
        .city:hover {
            background-color: #f5f5f5;
        }
        .category {
            display: flex;
            padding: 10px 15px;
            background-color: #fff;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #eee;
        }
        .category .item {
            padding: 5px 10px;
            margin-right: 10px;
            color: #666;
            cursor: pointer;
            border-radius: 4px;
        }
        .category .item.active {
            background-color: #0088ff;
            color: #fff;
        }
        .city-modal .content {
            width: 80%;
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
        }
        /* 城市选择弹窗 - 手动输入地址样式 */
        .manual-input {
            margin: 15px 0;
        }
        .manual-input input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: all 0.2s ease;
            background-color: #f9f9f9;
        }
        .manual-input input::placeholder {
            color: #999;
            font-size: 13px;
        }
        .manual-input input:focus {
            border-color: #0088ff;
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(0, 136, 255, 0.1);
        }
        .manual-input input:hover {
            border-color: #ddd;
        }
        .goods-list {
            padding: 10px 15px;
        }
        .goods-item {
            background-color: #fff;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .goods-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .goods-item .name {
            font-size: 15px;
            margin-bottom: 5px;
        }
        .goods-item .spec {
            color: #999;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .goods-item .price {
            color: #ff4400;
            font-size: 16px;
            font-weight: bold;
        }
        .goods-item .origin {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }
        .goods-item .contact {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }
        .loading-tip {
            text-align:center; 
            padding:20px; 
            color:#999;
        }

        /* ========== 底部Tab栏样式 ========== */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            background-color: #fff;
            border-top: 1px solid #eee;
            padding: 5px 0;
        }
        .tab-bar .tab-item {
            flex: 1;
            text-align: center;
            cursor: pointer;
        }
        .tab-bar .tab-item .icon {
            font-size: 20px;
            margin-bottom: 3px;
            display: block;
        }
        .tab-bar .tab-item .text {
            font-size: 12px;
            color: #666;
        }
        .tab-bar .tab-item.active .text {
            color: #0088ff;
        }
        .container {
            padding-bottom: 60px;
        }
    </style>
</head>
<body>
    <!-- 农产品展示页面主体 -->
    <div class="container">
        <!-- 顶部搜索栏 -->
        <div class="header">
            <div class="search-icon-wrap" id="searchBtn">
                <svg class="search-icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <path d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0 0 11.6 0l43.6-43.5a8.2 8.2 0 0 0 0-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C205.3 528 182 471.8 182 412s23.3-116.1 65.6-158.4C296 205.3 352.2 182 412 182s116.1 23.3 158.4 65.6S636 352.2 636 412s-23.2 116.1-65.6 158.4z" fill="#666"/>
                </svg>
            </div>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索农产品">
            <div class="city" id="cityBtn">请完成定位</div>
            <div class="search-tips" id="searchTips"></div>
        </div>

        <!-- 分类筛选栏 -->
        <div class="category">
            <div class="item active" data-category="蔬菜">蔬菜</div>
            <div class="item" data-category="水果">水果</div>
            <div class="item" data-category="肉食">肉食</div>
            <div class="item" data-category="乳饮">乳饮</div>
            <div class="item" data-category="零食">零食</div>
            <div class="item" data-category="全部">全部</div>
        </div>

        <!-- 地址选择弹窗 -->
        <div class="modal city-modal" id="cityModal">
            <div class="content">
                <div class="title">选择地址</div>
                <div class="location">自动定位：<span id="autoLocationText">正在定位...</span></div>
                <div class="manual-input">
                    <input type="text" id="manualAddressInput" placeholder="手动输入地址（例：湖南省湘潭市岳塘区建设路街道）">
                </div>
                <div class="btn-group">
                    <button class="cancel" id="cancelBtn">取消</button>
                    <button class="confirm" id="confirmBtn">确定</button>
                </div>
            </div>
        </div>

        <!-- 商品列表 -->
        <div class="goods-list" id="goodsList">
            <div class="loading-tip" id="loadingTip">加载中...</div>
        </div>
    </div>

    <!-- 底部Tab栏 -->
    <div class="tab-bar">
        <div class="tab-item active" data-page="goods">
            <span class="icon">🥬</span>
            <span class="text">农产品</span>
        </div>
        <div class="tab-item" data-page="publish">
            <span class="icon">📤</span>
            <span class="text">发布</span>
        </div>
        <div class="tab-item" data-page="mine">
            <span class="icon">👤</span>
            <span class="text">我的</span>
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div class="toast" id="toast"></div>

    <!-- 引入axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // ========== 核心配置（命名规范 + 保留原有逻辑） ==========
        // API基础配置
        const API_CONFIG = {
            baseUrl: 'http://localhost:8080/api',
            timeout: 15000
        };
        // 全局状态（语义化命名）
        const globalState = {
            currentAddress: '', // 当前选中地址（原currentCity）
            currentCategory: '蔬菜', // 当前选中分类
            isLocationLoading: false // 定位加载状态（防重复定位）
        };
        // 常量定义（规范命名）
        const CONSTANTS = {
            AMAP_API_KEY: '8ba61a695f4c0a3aae1735f800032de3', // 高德API Key（保留原Key）
            STORAGE_KEYS: {
                USER_ADDRESS: 'user_location_address' // 本地存储地址Key
            }
        };
        
        // 模拟商品列表数据（保留原数据，仅重命名）
        const mockProductList = [
            {
                id: 1,
                name: '500g-550g/份 云南小娃娃菜',
                spec: '500g-550g/份',
                price: 3.89,

                stock: 300,

                seller_name: '我是昵称',
                seller_address: '云南省昆明市',
                seller_phone: '122334455667',
                images: [
                    'https://picsum.photos/600/400?random=1',
                    'https://picsum.photos/600/400?random=2',
                    'https://picsum.photos/600/400?random=3'
                ]
            },
            {
                id: 2,
                name: '新鲜山东大葱 1kg装',
                spec: '1kg/份',
                price: 8.99,
                address: '山东省潍坊市寿光市',
                stock: 500,
                sales: 200,
                category: '大葱',
                variety: '蔬菜',
                shelf_life: '七天',
                package_method: '捆装',
                pesticide_used: '否',
                storage_method: '冷藏',
                support_pickup: '是',
                description: '新鲜现挖大葱，脆甜不辣，炒菜调味佳品！',
                seller_name: '大葱种植户',
                seller_address: '山东省潍坊市',
                seller_phone: '13888889999',
                images: [
                    'https://picsum.photos/600/400?random=4',
                    'https://picsum.photos/600/400?random=5'
                ]
            },
            {
                id: 3,
                name: '烟台红富士苹果 5斤装',
                spec: '5斤/份',
                price: 29.9,
                address: '山东省烟台市栖霞市',
                stock: 1000,
                sales: 500,
                category: '红富士',
                variety: '水果',
                shelf_life: '30天',
                package_method: '箱装',
                pesticide_used: '否',
                storage_method: '冷藏',
                support_pickup: '是',
                description: '新鲜烟台红富士，脆甜多汁，现摘现发！',
                seller_name: '苹果种植户',
                seller_address: '山东省烟台市',
                seller_phone: '13977778888',
                images: [
                    'https://picsum.photos/600/400?random=6',
                    'https://picsum.photos/600/400?random=7'
                ]
            }
        ];

        // ========== DOM元素缓存（统一管理 + 语义化命名） ==========
        const dom = {
            toast: document.getElementById('toast'),
            goodsList: document.getElementById('goodsList'),
            loadingTip: document.getElementById('loadingTip'),
            searchInput: document.getElementById('searchInput'),
            searchBtn: document.getElementById('searchBtn'),
            categoryItems: document.querySelectorAll('.category .item'),
            cityBtn: document.getElementById('cityBtn'),
            cityModal: document.getElementById('cityModal'),
            cancelBtn: document.getElementById('cancelBtn'),
            confirmBtn: document.getElementById('confirmBtn'),
            autoLocationText: document.getElementById('autoLocationText'),
            manualAddressInput: document.getElementById('manualAddressInput'),
            tabItems: document.querySelectorAll('.tab-bar .tab-item')
        };

        // ========== 工具函数（规范命名 + 保留原有逻辑） ==========
        /**
         * 显示Toast提示（原showToast，保留逻辑）
         * @param {string} message - 提示内容
         * @param {number} duration - 显示时长
         */
        function showToast(message, duration = 2000) {
            dom.toast.textContent = message;
            dom.toast.style.display = 'block';
            setTimeout(() => {
                dom.toast.style.display = 'none';
            }, duration);
        }

        /**
         * 防抖函数（原debounce，保留逻辑）
         * @param {Function} fn - 执行函数
         * @param {number} delay - 延迟时间
         * @returns {Function} 防抖函数
         */
        function debounce(fn, delay = 300) {
            let timer = null;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => {
                    fn.apply(this, args);
                }, delay);
            };
        }

        /**
         * 从本地存储读取定位地址（原getStoredAddress，保留逻辑）
         * @returns {string} 存储的地址
         */
        function getStoredAddress() {
            return localStorage.getItem(CONSTANTS.STORAGE_KEYS.USER_ADDRESS) || '';
        }

        /**
         * 保存定位地址到本地存储（原saveAddressToStorage，保留逻辑）
         * @param {string} address - 地址
         */
        function saveAddressToStorage(address) {
            localStorage.setItem(CONSTANTS.STORAGE_KEYS.USER_ADDRESS, address);
        }

        /**
         * 统一API请求封装（新增：接入API，失败则用模拟数据）
         * @param {string} url - API路径
         * @param {object} params - 请求参数
         * @returns {Promise} 请求结果
         */
        async function requestApi(url, params = {}) {
            try {
                const response = await axios({
                    baseURL: API_CONFIG.baseUrl,
                    url,
                    method: 'GET',
                    params,
                    timeout: API_CONFIG.timeout
                });
                // 假设后端返回格式：{ code: 200, data: [...], msg: '' }
                if (response.data.code === 200) {
                    return response.data.data;
                } else {
                    showToast(`接口返回异常：${response.data.msg}`);
                    return mockProductList; // 降级使用模拟数据
                }
            } catch (error) {
                console.error('API请求失败：', error);
                showToast('网络异常，使用本地模拟数据');
                return mockProductList; // 降级使用模拟数据
            }
        }

        // ========== 经纬度转街道级地址（完全保留原有逻辑） ==========
        async function getAddressByLngLat(lng, lat) {
            try {
                const response = await axios.get('https://restapi.amap.com/v3/geocode/regeo', {
                    params: {
                        key: CONSTANTS.AMAP_API_KEY,
                        location: `${lng},${lat}`,
                        extensions: 'all',
                        batch: false,
                        roadlevel: 0
                    }
                });
                if (response.data.status === '1' && response.data.regeocode) {
                    const addressComponent = response.data.regeocode.addressComponent;
                    const province = addressComponent.province || '';
                    const city = addressComponent.city || addressComponent.province || '';
                    const district = addressComponent.district || '';
                    const street = addressComponent.street || '';
                    let fullAddress = `${province}${city}${district}${street}`;
                    if (!street) {
                        fullAddress = `${province}${city}${district}`;
                    }
                    return fullAddress;
                } else {
                    return `定位失败（经纬度：${lng.toFixed(6)}, ${lat.toFixed(6)}）`;
                }
            } catch (error) {
                console.error('逆地理编码失败：', error);
                return `定位失败（经纬度：${lng.toFixed(6)}, ${lat.toFixed(6)}）`;
            }
        }

        // ========== 商品列表渲染（保留原有逻辑 + 接入API） ==========
        async function renderProductList(keyword = '') {
            dom.loadingTip.style.display = 'block';
            
            try {
                // 1. 调用API获取数据（新增：接入API，保留模拟数据降级）
                const apiParams = {
                    category: globalState.currentCategory,
                    keyword: keyword.trim(),
                    address: globalState.currentAddress
                };
                const productList = await requestApi('/products', apiParams);
                
                // 2. 筛选逻辑（完全保留原有逻辑）
                let filteredProducts = [...productList];
                if (globalState.currentCategory !== '全部') {
                    filteredProducts = filteredProducts.filter(item => item.variety === globalState.currentCategory);
                }
                if (keyword.trim()) {
                    const lowerKeyword = keyword.toLowerCase();
                    filteredProducts = filteredProducts.filter(item => 
                        item.name.toLowerCase().includes(lowerKeyword) ||
                        item.address.toLowerCase().includes(lowerKeyword) ||
                        item.category.toLowerCase().includes(lowerKeyword)
                    );
                }
                
                // 3. 渲染逻辑（完全保留原有逻辑）
                dom.loadingTip.style.display = 'none';
                dom.goodsList.innerHTML = '';
                if (filteredProducts.length === 0) {
                    dom.goodsList.innerHTML = '<div class="loading-tip">暂无相关农产品</div>';
                    return;
                }
                filteredProducts.forEach(item => {
                    const goodsItem = document.createElement('div');
                    goodsItem.className = 'goods-item';
                    goodsItem.innerHTML = `
                        <div class="name">${item.name}</div>
                        <div class="spec">${item.spec}</div>
                        <div class="price">¥${item.price.toFixed(2)}</div>
                        <div class="origin">产地：${item.address}</div>
                        <div class="contact">库存：${item.stock}件</div>
                    `;
                    dom.goodsList.appendChild(goodsItem);
                    goodsItem.addEventListener('click', () => {
                        window.location.href = `detail.html?id=${item.id}`;
                    });
                });
            } catch (error) {
                dom.loadingTip.style.display = 'none';
                console.error('渲染商品列表失败：', error);
                dom.goodsList.innerHTML = '<div class="loading-tip">加载失败，请重试</div>';
                showToast('加载失败，请重试');
            }
        }

        // ========== 城市选择弹窗逻辑（完全保留原有定位方式 + 规范命名） ==========
        function initAddressModal() {
            // 打开地址弹窗
            dom.cityBtn.addEventListener('click', async () => {
                // 防重复定位
                if (globalState.isLocationLoading) return;
                globalState.isLocationLoading = true;
                
                dom.cityModal.style.display = 'flex';
                dom.autoLocationText.textContent = '正在定位...';
                dom.manualAddressInput.value = '';
                
                // 真实定位逻辑（完全保留原有逻辑：前端高精度定位 + 高德逆地理编码）
                if (navigator.geolocation) {
                    try {
                        const position = await new Promise((resolve, reject) => {
                            navigator.geolocation.getCurrentPosition(
                                resolve,
                                reject,
                                {
                                    enableHighAccuracy: true,
                                    timeout: 10000,
                                    maximumAge: 0
                                }
                            );
                        });
                        const lng = position.coords.longitude;
                        const lat = position.coords.latitude;
                        const address = await getAddressByLngLat(lng, lat);
                        dom.autoLocationText.textContent = address;
                    } catch (error) {
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                dom.autoLocationText.textContent = '您拒绝了定位权限';
                                showToast('请开启定位权限以获取精确地址');
                                break;
                            case error.POSITION_UNAVAILABLE:
                                dom.autoLocationText.textContent = '定位信息不可用';
                                break;
                            case error.TIMEOUT:
                                dom.autoLocationText.textContent = '定位请求超时';
                                break;
                            default:
                                dom.autoLocationText.textContent = '定位失败';
                        }
                    }
                } else {
                    dom.autoLocationText.textContent = '您的浏览器不支持定位';
                    showToast('当前浏览器不支持定位功能，请手动输入地址');
                }
                
                globalState.isLocationLoading = false;
            });

            // 取消按钮（保留原有逻辑）
            dom.cancelBtn.addEventListener('click', () => {
                dom.cityModal.style.display = 'none';
            });

            // 确认按钮（保留原有逻辑 + 规范命名）
            dom.confirmBtn.addEventListener('click', () => {
                const address = dom.manualAddressInput.value.trim() || dom.autoLocationText.textContent;
                const invalidAddresses = ['正在定位...', '您拒绝了定位权限', '定位信息不可用', '定位请求超时', '定位失败', '您的浏览器不支持定位'];
                if (invalidAddresses.includes(address)) {
                    showToast('请输入有效的街道级地址（例：湖南省湘潭市岳塘区建设路街道）');
                    return;
                }
                globalState.currentAddress = address;
                saveAddressToStorage(address);
                dom.cityBtn.textContent = address;
                dom.cityModal.style.display = 'none';
                renderProductList(dom.searchInput.value);
                showToast(`已定位到：${address}`);
            });
        }

        // ========== 搜索&分类逻辑（保留原有逻辑 + 规范命名） ==========
        function initSearchAndCategory() {
            // 分类筛选（保留原有逻辑）
            dom.categoryItems.forEach(item => {
                item.addEventListener('click', () => {
                    dom.categoryItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    globalState.currentCategory = item.dataset.category;
                    renderProductList(dom.searchInput.value);
                });
            });

            // 搜索功能（保留原有逻辑）
            dom.searchBtn.addEventListener('click', () => {
                renderProductList(dom.searchInput.value);
            });

            dom.searchInput.addEventListener('keyup', debounce((e) => {
                if (e.key === 'Enter') {
                    renderProductList(dom.searchInput.value);
                }
            }));
        }

        // ========== Tab栏跳转逻辑（保留原有逻辑 + 规范命名） ==========
        function initTabBar() {
            dom.tabItems.forEach(item => {
                item.addEventListener('click', () => {
                    const targetPage = item.dataset.page;
                    switch(targetPage) {
                        case 'goods':
                            window.location.href = 'goods.html';
                            break;
                        case 'publish':
                            window.location.href = 'publish.html';
                            break;
                        case 'mine':
                            window.location.href = 'mine.html';
                            break;
                    }
                });
            });
        }

        // ========== 页面初始化（保留原有逻辑 + 规范命名） ==========
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 优先读取本地存储的地址
            const storedAddress = getStoredAddress();
            if (storedAddress) {
                globalState.currentAddress = storedAddress;
                dom.cityBtn.textContent = storedAddress;
                showToast(`已恢复上次定位：${storedAddress}`);
            }
            
            // 2. 初始化各模块
            initAddressModal();
            initSearchAndCategory();
            initTabBar();
            renderProductList();
        });
    </script>
</body>
</html>
