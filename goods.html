<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>农产品展示与发布平台 - 农产品列表</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            font-size: 14px;
            color: #333;
        }
        /* 通用弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal .content {
            width: 85%;
            background-color: #fff;
            border-radius: 12px;
            padding: 20px;
        }
        .modal .content .title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
        .modal .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .modal .btn-group button {
            width: 48%;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }
        .modal .cancel {
            background-color: #f5f5f5;
            color: #666;
        }
        .modal .confirm {
            background-color: #0088ff;
            color: #fff;
        }
        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 20px;
            background-color: rgba(0,0,0,0.7);
            color: #fff;
            border-radius: 4px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }

        /* ========== 农产品列表页样式 ========== */
        .header {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 99;
            gap: 8px;
        }
        .search-icon-wrap {
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        .search-icon-wrap:hover {
            background-color: #f5f5f5;
        }
        .search-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        .search-input {
            flex: 1;
            height: 36px;
            line-height: 36px;
            padding: 0 12px;
            border: 1px solid #eee;
            border-radius: 18px;
            background-color: #f8f8f8;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: #0088ff;
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(0, 136, 255, 0.1);
        }
        .search-input::placeholder {
            color: #999;
        }
        .city {
            margin-left: 5px;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
            white-space: nowrap;
        }
        .city:hover {
            background-color: #f5f5f5;
        }
        .category {
            display: flex;
            padding: 10px 15px;
            background-color: #fff;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #eee;
        }
        .category .item {
            padding: 5px 10px;
            margin-right: 10px;
            color: #666;
            cursor: pointer;
            border-radius: 4px;
        }
        .category .item.active {
            background-color: #0088ff;
            color: #fff;
        }
        .city-modal .content {
            width: 80%;
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
        }
        /* 城市选择弹窗 - 手动输入地址样式 */
        .manual-input {
            margin: 15px 0;
        }
        .manual-input input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: all 0.2s ease;
            background-color: #f9f9f9;
        }
        .manual-input input::placeholder {
            color: #999;
            font-size: 13px;
        }
        .manual-input input:focus {
            border-color: #0088ff;
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(0, 136, 255, 0.1);
        }
        .manual-input input:hover {
            border-color: #ddd;
        }
        .goods-list {
            padding: 10px 15px;
        }
        .goods-item {
            background-color: #fff;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .goods-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .goods-item .name {
            font-size: 15px;
            margin-bottom: 5px;
        }
        .goods-item .spec {
            color: #999;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .goods-item .price {
            color: #ff4400;
            font-size: 16px;
            font-weight: bold;
        }
        .goods-item .origin {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }
        .goods-item .contact {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }
        .loading-tip {
            text-align:center; 
            padding:20px; 
            color:#999;
        }

        /* ========== 底部Tab栏样式 ========== */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            background-color: #fff;
            border-top: 1px solid #eee;
            padding: 5px 0;
        }
        .tab-bar .tab-item {
            flex: 1;
            text-align: center;
            cursor: pointer;
        }
        .tab-bar .tab-item .icon {
            font-size: 20px;
            margin-bottom: 3px;
            display: block;
        }
        .tab-bar .tab-item .text {
            font-size: 12px;
            color: #666;
        }
        .tab-bar .tab-item.active .text {
            color: #0088ff;
        }
        .container {
            padding-bottom: 60px;
        }
    </style>
</head>
<body>
    <!-- 农产品展示页面主体 -->
    <div class="container">
        <!-- 顶部搜索栏 -->
        <div class="header">
            <div class="search-icon-wrap" id="searchBtn">
                <svg class="search-icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <path d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0 0 11.6 0l43.6-43.5a8.2 8.2 0 0 0 0-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C205.3 528 182 471.8 182 412s23.3-116.1 65.6-158.4C296 205.3 352.2 182 412 182s116.1 23.3 158.4 65.6S636 352.2 636 412s-23.2 116.1-65.6 158.4z" fill="#666"/>
                </svg>
            </div>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索农产品">
            <div class="city" id="cityBtn">湘潭市</div>
            <div class="search-tips" id="searchTips"></div>
        </div>

        <!-- 分类筛选栏 -->
        <div class="category">
            <div class="item active" data-category="蔬菜">蔬菜</div>
            <div class="item" data-category="水果">水果</div>
            <div class="item" data-category="肉食">肉食</div>
            <div class="item" data-category="乳饮">乳饮</div>
            <div class="item" data-category="零食">零食</div>
            <div class="item" data-category="全部">全部</div>
        </div>

        <!-- 地址选择弹窗 -->
        <div class="modal city-modal" id="cityModal">
            <div class="content">
                <div class="title">选择城市</div>
                <div class="location">自动定位：<span id="autoLocationText">正在定位...</span></div>
                <div class="manual-input">
                    <input type="text" id="manualAddressInput" placeholder="手动输入地址">
                </div>
                <div class="btn-group">
                    <button class="cancel" id="cancelBtn">取消</button>
                    <button class="confirm" id="confirmBtn">确定</button>
                </div>
            </div>
        </div>

        <!-- 商品列表 -->
        <div class="goods-list" id="goodsList">
            <div class="loading-tip" id="loadingTip">加载中...</div>
        </div>
    </div>

    <!-- 底部Tab栏 -->
    <div class="tab-bar">
        <div class="tab-item active" data-page="goods">
            <span class="icon">🥬</span>
            <span class="text">农产品</span>
        </div>
        <div class="tab-item" data-page="publish">
            <span class="icon">📤</span>
            <span class="text">发布</span>
        </div>
        <div class="tab-item" data-page="mine">
            <span class="icon">👤</span>
            <span class="text">我的</span>
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div class="toast" id="toast"></div>

    <!-- 引入axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // ========== 核心配置 & 模拟数据 ==========
        const BASE_API_URL = 'http://localhost:8080/api';
        let currentCity = '湘潭市'; // 当前选中城市
        let currentCategory = '蔬菜'; // 当前选中分类
        
        // 模拟商品列表数据
        const mockGoodsList = [
            {
                id: 1,
                name: '500g-550g/份 云南小娃娃菜',
                spec: '500g-550g/份',
                price: 3.89,
                address: '云南省昆明市乡村县',
                stock: 300,
                sales: 300,
                category: '黄心白菜',
                variety: '蔬菜',
                shelf_life: '三天',
                package_method: '袋装',
                pesticide_used: '否',
                storage_method: '常温',
                support_pickup: '是',
                description: '优质娃娃菜，现摘现邮。买后一天内发货。涮火锅炒菜都好吃！',
                seller_name: '我是昵称',
                seller_address: '云南省昆明市',
                seller_phone: '122334455667',
                images: [
                    'https://picsum.photos/600/400?random=1',
                    'https://picsum.photos/600/400?random=2',
                    'https://picsum.photos/600/400?random=3'
                ]
            },
            {
                id: 2,
                name: '新鲜山东大葱 1kg装',
                spec: '1kg/份',
                price: 8.99,
                address: '山东省潍坊市寿光市',
                stock: 500,
                sales: 200,
                category: '大葱',
                variety: '蔬菜',
                shelf_life: '七天',
                package_method: '捆装',
                pesticide_used: '否',
                storage_method: '冷藏',
                support_pickup: '是',
                description: '新鲜现挖大葱，脆甜不辣，炒菜调味佳品！',
                seller_name: '大葱种植户',
                seller_address: '山东省潍坊市',
                seller_phone: '13888889999',
                images: [
                    'https://picsum.photos/600/400?random=4',
                    'https://picsum.photos/600/400?random=5'
                ]
            },
            {
                id: 3,
                name: '烟台红富士苹果 5斤装',
                spec: '5斤/份',
                price: 29.9,
                address: '山东省烟台市栖霞市',
                stock: 1000,
                sales: 500,
                category: '红富士',
                variety: '水果',
                shelf_life: '30天',
                package_method: '箱装',
                pesticide_used: '否',
                storage_method: '冷藏',
                support_pickup: '是',
                description: '新鲜烟台红富士，脆甜多汁，现摘现发！',
                seller_name: '苹果种植户',
                seller_address: '山东省烟台市',
                seller_phone: '13977778888',
                images: [
                    'https://picsum.photos/600/400?random=6',
                    'https://picsum.photos/600/400?random=7'
                ]
            }
        ];

        // ========== DOM元素缓存 ==========
        const toast = document.getElementById('toast');
        const goodsList = document.getElementById('goodsList');
        const loadingTip = document.getElementById('loadingTip');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const categoryItems = document.querySelectorAll('.category .item');
        const cityBtn = document.getElementById('cityBtn');
        const cityModal = document.getElementById('cityModal');
        const cancelBtn = document.getElementById('cancelBtn');
        const confirmBtn = document.getElementById('confirmBtn');
        const autoLocationText = document.getElementById('autoLocationText');
        const manualAddressInput = document.getElementById('manualAddressInput');
        const tabItems = document.querySelectorAll('.tab-bar .tab-item');

        // ========== 工具函数 ==========
        // Toast提示
        function showToast(message, duration = 2000) {
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }

        // 防抖函数
        function debounce(fn, delay = 300) {
            let timer = null;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => {
                    fn.apply(this, args);
                }, delay);
            };
        }

        // ========== 商品列表渲染函数 ==========
        function renderGoodsList(keyword = '') {
            loadingTip.style.display = 'block';
            
            // 模拟异步加载
            setTimeout(() => {
                try {
                    let filteredGoods = [...mockGoodsList];
                    
                    // 分类筛选
                    if (currentCategory !== '全部') {
                        filteredGoods = filteredGoods.filter(item => item.variety === currentCategory);
                    }
                    
                    // 关键词搜索
                    if (keyword.trim()) {
                        const lowerKeyword = keyword.toLowerCase();
                        filteredGoods = filteredGoods.filter(item => 
                            item.name.toLowerCase().includes(lowerKeyword) ||
                            item.address.toLowerCase().includes(lowerKeyword) ||
                            item.category.toLowerCase().includes(lowerKeyword)
                        );
                    }
                    
                    loadingTip.style.display = 'none';
                    goodsList.innerHTML = '';
                    
                    // 无数据提示
                    if (filteredGoods.length === 0) {
                        goodsList.innerHTML = '<div class="loading-tip">暂无相关农产品</div>';
                        return;
                    }
                    
                    // 渲染商品列表（点击跳转到详情页）
                    filteredGoods.forEach(item => {
                        const goodsItem = document.createElement('div');
                        goodsItem.className = 'goods-item';
                        goodsItem.innerHTML = `
                            <div class="name">${item.name}</div>
                            <div class="spec">${item.spec}</div>
                            <div class="price">¥${item.price.toFixed(2)}</div>
                            <div class="origin">产地：${item.address}</div>
                            <div class="contact">库存：${item.stock}件</div>
                        `;
                        goodsList.appendChild(goodsItem);
                        
                        // 点击跳转到详情页（携带商品ID）
                        goodsItem.addEventListener('click', () => {
                            window.location.href = `detail.html?id=${item.id}`;
                        });
                    });
                } catch (error) {
                    loadingTip.style.display = 'none';
                    console.error('渲染商品列表失败：', error);
                    goodsList.innerHTML = '<div class="loading-tip">加载失败，请重试</div>';
                    showToast('加载失败，请重试');
                }
            }, 500);
        }

        // ========== 城市选择弹窗逻辑 ==========
        function initCityModal() {
            // 打开城市弹窗
            cityBtn.addEventListener('click', () => {
                cityModal.style.display = 'flex';
                autoLocationText.textContent = '正在定位...';
                
                // 模拟定位
                setTimeout(() => {
                    autoLocationText.textContent = '湖南省湘潭市岳塘区';
                }, 1000);
            });

            // 取消按钮
            cancelBtn.addEventListener('click', () => {
                cityModal.style.display = 'none';
            });

            // 确认按钮
            confirmBtn.addEventListener('click', () => {
                const address = manualAddressInput.value.trim() || autoLocationText.textContent;
                currentCity = address;
                cityBtn.textContent = address;
                cityModal.style.display = 'none';
                renderGoodsList(searchInput.value); // 重新加载列表
            });
        }

        // ========== 搜索&分类逻辑 ==========
        function initSearchAndCategory() {
            // 分类筛选
            categoryItems.forEach(item => {
                item.addEventListener('click', () => {
                    categoryItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentCategory = item.dataset.category;
                    renderGoodsList(searchInput.value); // 带关键词重新加载
                });
            });

            // 搜索功能
            searchBtn.addEventListener('click', () => {
                renderGoodsList(searchInput.value);
            });

            searchInput.addEventListener('keyup', debounce((e) => {
                if (e.key === 'Enter') {
                    renderGoodsList(searchInput.value);
                }
            }));
        }

        // ========== Tab栏跳转逻辑 ==========
        function initTabBar() {
            tabItems.forEach(item => {
                item.addEventListener('click', () => {
                    const targetPage = item.dataset.page;
                    switch(targetPage) {
                        case 'goods':
                            window.location.href = 'goods.html';
                            break;
                        case 'publish':
                            window.location.href = 'publish.html';
                            break;
                        case 'mine':
                            window.location.href = 'mine.html';
                            break;
                    }
                });
            });
        }

        // ========== 页面初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            initCityModal();
            initSearchAndCategory();
            initTabBar();
            renderGoodsList();
        });
    </script>
</body>
</html>
