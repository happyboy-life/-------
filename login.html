<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农产品平台登录页</title>
    <style>
        /* 全局样式重置与基础配置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: #f5f5f5;
            min-height: 100vh;
        }
        /* 页面模块通用样式 */
        .page-section {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
        }
        .page-section.active {
            display: flex;
        }

        /* 1. 欢迎页（底部注册登录按钮） */
        #welcomeSection {
            flex-direction: column;
            justify-content: flex-end;
            gap: 16px;
            padding-bottom: 40px;
        }
        .welcome-btn {
            width: 100%;
            height: 52px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background-color: #007AFF;
            color: #fff;
        }
        .btn-default {
            background-color: #fff;
            color: #000;
            border: 1px solid #e5e7eb;
        }
        .btn-later {
            height: 40px;
            background-color: transparent;
            color: #007AFF;
            font-size: 16px;
        }
        .btn-later:hover {
            background-color: rgba(0, 122, 255, 0.08);
        }

        /* 2. 登录表单容器 */
        #loginContainer {
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }
        .login-card {
            width: 100%;
            max-width: 360px;
            background-color: #fff;
            border-radius: 8px;
            padding: 24px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .login-card.active {
            display: flex;
        }

        /* 头像触发按钮 */
        .avatar-trigger-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }
        .avatar-add-btn {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            border: none;
            background-color: #f5f5f5;
            font-size: 24px;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .avatar-add-btn.has-avatar {
            font-size: 0;
        }

        /* 表单输入框样式 */
        .form-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: none;
            border-radius: 4px;
            background-color: #f5f5f5;
            font-size: 14px;
        }
        .form-input.error {
            border: 1px solid #ff3b30;
        }
        .error-tip {
            font-size: 12px;
            color: #ff3b30;
            height: 16px;
            margin-top: 4px;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 20px;
            background-color: #dcfce7;
            color: #166534;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        .login-btn:disabled {
            background-color: #eee;
            color: #999;
            cursor: not-allowed;
        }
        .login-btn.loading {
            background-color: #dcfce7;
            cursor: wait;
        }

        /* 登录方式切换文本 */
        .login-switch-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin: 8px 0;
            cursor: pointer;
        }

        /* 协议勾选区域 */
        .agreement-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #999;
            margin-top: 16px;
        }

        /* 3. 头像上传页面 */
        #avatarSection {
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }
        .avatar-card {
            width: 100%;
            max-width: 360px;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
        }
        .avatar-back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-grid-wrap {
            max-height: 400px;
            overflow-y: auto;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background-color: #eee;
        }
        .grid-item {
            aspect-ratio: 1/1;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .grid-add-btn {
            font-size: 24px;
            color: #333;
            border: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .grid-tip {
            font-size: 12px;
            color: #999;
            padding: 8px 12px;
            text-align: right;
        }
    </style>
</head>
<body>
    <!-- 欢迎页（注册登录入口） -->
    <section id="welcomeSection" class="page-section active">
        <button class="welcome-btn btn-primary" id="signUpBtn">注册</button>
        <button class="welcome-btn btn-default" id="loginBtn">登录</button>
        <button class="welcome-btn btn-later" id="laterLoginBtn">稍后登录</button>
    </section>

    <!-- 登录容器 -->
    <section id="loginContainer" class="page-section">
        <!-- 验证码登录页 -->
        <div id="codeLoginCard" class="login-card active">
            <div class="avatar-trigger-wrap">
                <button type="button" class="avatar-add-btn" id="avatarTrigger">+</button>
            </div>
            <input type="text" class="form-input" placeholder="请输入姓名" id="codeUserName">
            <div class="error-tip" id="codeUserNameError"></div>
            <input type="tel" class="form-input" placeholder="请输入手机号" id="codePhone">
            <div class="error-tip" id="codePhoneError"></div>
            <span class="login-switch-text" id="toPwdLogin">切换为密码登录</span>
            <button type="button" class="login-btn" id="codeLoginBtn" disabled>登录</button>
            <label class="agreement-wrap">
                <input type="checkbox" id="codeAgreement">
                <span>我已阅读并同意《用户协议》与《隐私政策》</span>
            </label>
        </div>

        <!-- 密码登录页 -->
        <div id="pwdLoginCard" class="login-card">
            <div class="avatar-trigger-wrap">
                <button type="button" class="avatar-add-btn" id="avatarTrigger2">+</button>
            </div>
            <input type="text" class="form-input" placeholder="请输入姓名" id="pwdUserName">
            <div class="error-tip" id="pwdUserNameError"></div>
            <input type="password" class="form-input" placeholder="请输入密码" id="pwdInput">
            <div class="error-tip" id="pwdInputError"></div>
            <span class="login-switch-text" id="toCodeLogin">切换为验证码登录</span>
            <button type="button" class="login-btn" id="pwdLoginBtn" disabled>登录</button>
            <label class="agreement-wrap">
                <input type="checkbox" id="pwdAgreement">
                <span>我已阅读并同意《用户协议》与《隐私政策》</span>
            </label>
        </div>
    </section>

    <!-- 头像上传页 -->
    <section id="avatarSection" class="page-section">
        <div class="avatar-card">
            <button type="button" class="avatar-back-btn" id="avatarBackBtn">←</button>
            <div class="avatar-grid-wrap">
                <div class="avatar-grid">
                    <div class="grid-item">
                        <button type="button" class="grid-add-btn" id="uploadAvatarBtn">+</button>
                    </div>
                    <div class="grid-item" data-avatar="https://picsum.photos/200/200?random=1">
                        <img src="https://picsum.photos/200/200?random=1" alt="默认头像1">
                    </div>
                    <div class="grid-item" data-avatar="https://picsum.photos/200/200?random=2">
                        <img src="https://picsum.photos/200/200?random=2" alt="默认头像2">
                    </div>
                    <div class="grid-item" data-avatar="https://picsum.photos/200/200?random=3">
                        <img src="https://picsum.photos/200/200?random=3" alt="默认头像3">
                    </div>
                    <div class="grid-item" data-avatar="https://picsum.photos/200/200?random=4">
                        <img src="https://picsum.photos/200/200?random=4" alt="默认头像4">
                    </div>
                </div>
                <div class="grid-tip">可上下滑动选择</div>
            </div>
        </div>
    </section>

    <script>
        // ===================== 全局配置（规范命名+统一管理） =====================
        const API_CONFIG = {
            baseUrl: 'http://localhost:8080', // 后端服务根地址
            timeout: 10000, // 请求超时时间
            headers: {
                'Content-Type': 'application/json;charset=UTF-8'
            },
            // 规范API路径（RESTful风格）
            apiPaths: {
                loginByPhone: '/api/v1/auth/login/phone', // 手机号登录
                loginByPassword: '/api/v1/auth/login/password', // 密码登录
                uploadAvatar: '/api/v1/user/avatar/upload' // 头像上传
            }
        };

        // ===================== 全局状态管理（规范命名） =====================
        let globalState = {
            selectedAvatarUrl: '', // 选中的头像URL
            avatarFile: null, // 待上传的头像文件
            isLoginSubmitting: false // 是否正在提交登录请求（防重复提交）
        };

        // ===================== DOM元素获取（语义化命名） =====================
        const pageElements = {
            welcomeSection: document.getElementById('welcomeSection'),
            loginContainer: document.getElementById('loginContainer'),
            avatarSection: document.getElementById('avatarSection'),
            codeLoginCard: document.getElementById('codeLoginCard'),
            pwdLoginCard: document.getElementById('pwdLoginCard'),
            // 验证码登录相关
            codeUserName: document.getElementById('codeUserName'),
            codePhone: document.getElementById('codePhone'),
            codeAgreement: document.getElementById('codeAgreement'),
            codeLoginBtn: document.getElementById('codeLoginBtn'),
            codeUserNameError: document.getElementById('codeUserNameError'),
            codePhoneError: document.getElementById('codePhoneError'),
            // 密码登录相关
            pwdUserName: document.getElementById('pwdUserName'),
            pwdInput: document.getElementById('pwdInput'),
            pwdAgreement: document.getElementById('pwdAgreement'),
            pwdLoginBtn: document.getElementById('pwdLoginBtn'),
            pwdUserNameError: document.getElementById('pwdUserNameError'),
            pwdInputError: document.getElementById('pwdInputError'),
            // 头像相关
            avatarTrigger: document.getElementById('avatarTrigger'),
            avatarTrigger2: document.getElementById('avatarTrigger2'),
            avatarBackBtn: document.getElementById('avatarBackBtn'),
            uploadAvatarBtn: document.getElementById('uploadAvatarBtn')
        };

        // ===================== 工具函数（通用+规范） =====================
        /**
         * 统一API请求封装
         * @param {string} url - 请求地址
         * @param {string} method - 请求方法
         * @param {object} data - 请求参数
         * @param {object} options - 额外配置（如headers、isFormData）
         * @returns {Promise} 请求结果
         */
        async function requestApi(url, method = 'POST', data = {}, options = {}) {
            // 拼接完整URL
            const fullUrl = `${API_CONFIG.baseUrl}${url}`;
            // 处理请求头
            const requestHeaders = { ...API_CONFIG.headers, ...options.headers };
            // 处理请求体（FormData/JSON）
            const requestBody = options.isFormData ? data : JSON.stringify(data);

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), API_CONFIG.timeout);

                const response = await fetch(fullUrl, {
                    method,
                    headers: requestHeaders,
                    body: requestBody,
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                // 统一响应处理
                if (!response.ok) {
                    throw new Error(`HTTP错误，状态码：${response.status}`);
                }

                const result = await response.json();
                // 假设后端返回格式：{ code: 200, msg: '成功', data: {} }
                if (result.code !== 200) {
                    throw new Error(result.msg || '接口请求失败');
                }
                return result.data;
            } catch (error) {
                console.error(`API请求失败 [${url}]：`, error);
                throw new Error(error.message || '网络异常，请稍后重试');
            }
        }

        /**
         * 表单验证函数
         * @param {string} type - 验证类型（codeLogin/pwdLogin）
         * @returns {boolean} 是否验证通过
         */
        function validateForm(type) {
            let isPass = true;
            const {
                codeUserName, codePhone, codeUserNameError, codePhoneError,
                pwdUserName, pwdInput, pwdUserNameError, pwdInputError
            } = pageElements;

            // 清空错误提示
            codeUserNameError.textContent = '';
            codePhoneError.textContent = '';
            pwdUserNameError.textContent = '';
            pwdInputError.textContent = '';
            // 移除错误样式
            [codeUserName, codePhone, pwdUserName, pwdInput].forEach(el => el?.classList.remove('error'));

            if (type === 'codeLogin') {
                // 姓名验证
                if (!codeUserName.value.trim()) {
                    codeUserNameError.textContent = '请输入姓名';
                    codeUserName.classList.add('error');
                    isPass = false;
                }
                // 手机号验证
                const phoneReg = /^1[3-9]\d{9}$/;
                if (!codePhone.value.trim()) {
                    codePhoneError.textContent = '请输入手机号';
                    codePhone.classList.add('error');
                    isPass = false;
                } else if (!phoneReg.test(codePhone.value.trim())) {
                    codePhoneError.textContent = '请输入有效的手机号';
                    codePhone.classList.add('error');
                    isPass = false;
                }
            } else if (type === 'pwdLogin') {
                // 姓名验证
                if (!pwdUserName.value.trim()) {
                    pwdUserNameError.textContent = '请输入姓名';
                    pwdUserName.classList.add('error');
                    isPass = false;
                }
                // 密码验证（简单强度）
                if (!pwdInput.value.trim()) {
                    pwdInputError.textContent = '请输入密码';
                    pwdInput.classList.add('error');
                    isPass = false;
                } else if (pwdInput.value.length < 6) {
                    pwdInputError.textContent = '密码长度不能少于6位';
                    pwdInput.classList.add('error');
                    isPass = false;
                }
            }

            return isPass;
        }

        /**
         * 同步头像显示到按钮
         */
        function syncAvatarDisplay() {
            const { avatarTrigger, avatarTrigger2 } = pageElements;
            if (globalState.selectedAvatarUrl) {
                avatarTrigger.style.backgroundImage = `url(${globalState.selectedAvatarUrl})`;
                avatarTrigger.classList.add('has-avatar');
                avatarTrigger2.style.backgroundImage = `url(${globalState.selectedAvatarUrl})`;
                avatarTrigger2.classList.add('has-avatar');
            } else {
                avatarTrigger.style.backgroundImage = '';
                avatarTrigger.classList.remove('has-avatar');
                avatarTrigger2.style.backgroundImage = '';
                avatarTrigger2.classList.remove('has-avatar');
            }
        }

        /**
         * 处理登录成功逻辑
         * @param {object} userInfo - 用户信息
         */
        function handleLoginSuccess(userInfo) {
            // 存储登录态（Token+用户信息，规范命名）
            localStorage.setItem('accessToken', userInfo.token);
            localStorage.setItem('userInfo', JSON.stringify(userInfo));
            // 清除游客标记
            localStorage.removeItem('userType');
            // 提示并跳转
            alert('登录成功！即将跳转到首页');
            window.location.href = 'index.html'; // 首页路径
        }

        // ===================== 页面交互逻辑（完善+规范） =====================
        // 1. 欢迎页交互
        document.getElementById('signUpBtn').addEventListener('click', () => {
            alert('注册功能待开发，暂跳转到登录页');
            pageElements.welcomeSection.classList.remove('active');
            pageElements.loginContainer.classList.add('active');
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            pageElements.welcomeSection.classList.remove('active');
            pageElements.loginContainer.classList.add('active');
        });

        // 稍后登录（游客模式）
        document.getElementById('laterLoginBtn').addEventListener('click', () => {
            localStorage.setItem('userType', 'guest');
            alert('已进入游客模式，您可浏览商品但无法下单/收藏，如需完整功能请登录');
            window.location.href = 'goods.html'; // 商品列表页
        });

        // 2. 登录方式切换
        document.getElementById('toPwdLogin').addEventListener('click', () => {
            pageElements.codeLoginCard.classList.remove('active');
            pageElements.pwdLoginCard.classList.add('active');
            syncAvatarDisplay();
        });

        document.getElementById('toCodeLogin').addEventListener('click', () => {
            pageElements.pwdLoginCard.classList.remove('active');
            pageElements.codeLoginCard.classList.add('active');
            syncAvatarDisplay();
        });

        // 3. 头像选择/上传逻辑
        // 跳转到头像选择页
        function goToAvatarPage() {
            pageElements.loginContainer.classList.remove('active');
            pageElements.avatarSection.classList.add('active');
        }
        pageElements.avatarTrigger.addEventListener('click', goToAvatarPage);
        pageElements.avatarTrigger2.addEventListener('click', goToAvatarPage);

        // 返回登录页
        pageElements.avatarBackBtn.addEventListener('click', () => {
            pageElements.avatarSection.classList.remove('active');
            pageElements.loginContainer.classList.add('active');
        });

        // 选择默认头像
        document.querySelectorAll('.grid-item[data-avatar]').forEach(item => {
            item.addEventListener('click', async () => {
                try {
                    globalState.selectedAvatarUrl = item.getAttribute('data-avatar');
                    globalState.avatarFile = null; // 清空上传文件
                    syncAvatarDisplay();
                    alert('已选择默认头像');
                    pageElements.avatarSection.classList.remove('active');
                    pageElements.loginContainer.classList.add('active');
                } catch (error) {
                    alert(`选择头像失败：${error.message}`);
                }
            });
        });

        // 上传自定义头像（完整对接后端API）
        pageElements.uploadAvatarBtn.addEventListener('click', () => {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/jpeg,image/png,image/gif';
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 前端预览
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        // 1. 前端预览
                        globalState.selectedAvatarUrl = event.target.result;
                        globalState.avatarFile = file;
                        syncAvatarDisplay();

                        // 2. 上传头像到后端（FormData格式）
                        const formData = new FormData();
                        formData.append('avatarFile', file);
                        // 调用头像上传API
                        const avatarData = await requestApi(
                            API_CONFIG.apiPaths.uploadAvatar,
                            'POST',
                            formData,
                            {
                                headers: {}, // 清空默认JSON头
                                isFormData: true // 标记为FormData请求
                            }
                        );

                        // 3. 更新全局头像URL为后端返回的地址
                        globalState.selectedAvatarUrl = avatarData.avatarUrl;
                        syncAvatarDisplay();

                        alert(`头像上传成功：${file.name}`);
                        pageElements.avatarSection.classList.remove('active');
                        pageElements.loginContainer.classList.add('active');
                    } catch (error) {
                        alert(`头像上传失败：${error.message}`);
                    }
                };
                reader.readAsDataURL(file);
            };
            fileInput.click();
        });

        // 4. 协议勾选与登录按钮联动
        pageElements.codeAgreement.addEventListener('change', () => {
            pageElements.codeLoginBtn.disabled = !pageElements.codeAgreement.checked;
        });

        pageElements.pwdAgreement.addEventListener('change', () => {
            pageElements.pwdLoginBtn.disabled = !pageElements.pwdAgreement.checked;
        });

        // 5. 验证码登录（完整API对接+防重复提交）
        pageElements.codeLoginBtn.addEventListener('click', async () => {
            // 防重复提交
            if (globalState.isLoginSubmitting) return;
            // 表单验证
            if (!validateForm('codeLogin')) return;
            // 协议未勾选
            if (!pageElements.codeAgreement.checked) {
                alert('请阅读并同意用户协议与隐私政策');
                return;
            }

            try {
                globalState.isLoginSubmitting = true;
                pageElements.codeLoginBtn.textContent = '登录中...';
                pageElements.codeLoginBtn.classList.add('loading');

                // 构造请求参数
                const loginParams = {
                    userName: pageElements.codeUserName.value.trim(),
                    phone: pageElements.codePhone.value.trim(),
                    avatarUrl: globalState.selectedAvatarUrl // 携带头像URL
                };

                // 调用手机号登录API
                const userInfo = await requestApi(
                    API_CONFIG.apiPaths.loginByPhone,
                    'POST',
                    loginParams
                );

                // 处理登录成功
                handleLoginSuccess(userInfo);
            } catch (error) {
                alert(`登录失败：${error.message}`);
            } finally {
                globalState.isLoginSubmitting = false;
                pageElements.codeLoginBtn.textContent = '登录';
                pageElements.codeLoginBtn.classList.remove('loading');
            }
        });

        // 6. 密码登录（完整API对接+防重复提交）
        pageElements.pwdLoginBtn.addEventListener('click', async () => {
            // 防重复提交
            if (globalState.isLoginSubmitting) return;
            // 表单验证
            if (!validateForm('pwdLogin')) return;
            // 协议未勾选
            if (!pageElements.pwdAgreement.checked) {
                alert('请阅读并同意用户协议与隐私政策');
                return;
            }

            try {
                globalState.isLoginSubmitting = true;
                pageElements.pwdLoginBtn.textContent = '登录中...';
                pageElements.pwdLoginBtn.classList.add('loading');

                // 构造请求参数
                const loginParams = {
                    userName: pageElements.pwdUserName.value.trim(),
                    password: pageElements.pwdInput.value.trim(),
                    avatarUrl: globalState.selectedAvatarUrl // 携带头像URL
                };

                // 调用密码登录API
                const userInfo = await requestApi(
                    API_CONFIG.apiPaths.loginByPassword,
                    'POST',
                    loginParams
                );

                // 处理登录成功
                handleLoginSuccess(userInfo);
            } catch (error) {
                alert(`登录失败：${error.message}`);
            } finally {
                globalState.isLoginSubmitting = false;
                pageElements.pwdLoginBtn.textContent = '登录';
                pageElements.pwdLoginBtn.classList.remove('loading');
            }
        });

        // 7. 输入框实时校验（提升用户体验）
        pageElements.codeUserName.addEventListener('input', () => validateForm('codeLogin'));
        pageElements.codePhone.addEventListener('input', () => validateForm('codeLogin'));
        pageElements.pwdUserName.addEventListener('input', () => validateForm('pwdLogin'));
        pageElements.pwdInput.addEventListener('input', () => validateForm('pwdLogin'));
    </script>
</body>
</html>
